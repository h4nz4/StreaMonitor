services:
  streamonitor:
    # If you want to build locally, use this instead the image line below:
    build: ./
    image: streamonitor:latest


    restart: unless-stopped
    environment:
      # set timzeone
      #TZ: Etc/UTC
      # unset password (admin by default)
      #STRMNTR_PASSWORD: ''
      # unbind web interface (bound to 127.0.0.1 by default)
      STRMNTR_HOST: "0.0.0.0"
      # change confirm delete behavior: disable
      #STRMNTR_CONFIRM_DEL: ""
      # change confirm delete behavior: always-on
      #STRMNTR_CONFIRM_DEL: "True"
      STRMNTR_CONFIRM_DEL: "MOBILE"
      # enable theater mode
      #STRMNTR_THEATER_MODE: "True
      # set refresh frequency on streamer page
      STRMNTR_STATUS_FREQ: "5"
      # set refresh frequency on list page
      STRMNTR_LIST_FREQ: "30"
      # File inside mounted dir — avoids Docker turning a missing bind-mount file into a directory
      STRMNTR_CONFIG: "/app/data/config.json"
      # SQLite (default path matches CONFIG parent dir). For PostgreSQL use e.g. postgresql+psycopg://user:pass@postgres:5432/streamonitor
      STRMNTR_DATABASE_URL: "sqlite:////app/data/streamonitor.db"
    volumes:
      - ./downloads:/app/downloads
      # Host: streamonitor-data/config.json — copy from ./config.json when migrating
      - ./streamonitor-data:/app/data
      - ./stripchat_mouflon_keys.json:/app/stripchat_mouflon_keys.json
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '5000:5000'
